<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" rx="12" fill="url(#bgGrad)"/>
  <rect x="0" y="60" width="1000" height="340" fill="url(#signalGrad)" opacity="0.5"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">GNSS RF Signal Chain — From Satellite to Digital Samples</text>

  <!-- Signal level bar at bottom -->
  <rect x="60" y="440" width="880" height="6" rx="3" fill="#334155"/>
  <rect x="60" y="440" width="880" height="6" rx="3" fill="url(#signalGrad)" opacity="0.6"/>
  <text x="60" y="470" fill="#94a3b8" font-size="11">-130 dBm</text>
  <text x="500" y="470" fill="#94a3b8" font-size="11" text-anchor="middle">Signal Power Level</text>
  <text x="940" y="470" fill="#3b82f6" font-size="11" text-anchor="end">-20 dBm (ADC input)</text>

  <!-- Satellite icon -->
  <g transform="translate(30, 100)">
    <circle cx="20" cy="20" r="8" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="12" y1="20" x2="2" y2="12" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="28" y1="20" x2="38" y2="12" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="16" y="16" width="8" height="8" rx="1" fill="#fbbf24" opacity="0.4"/>
    <text x="20" y="55" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">SAT</text>
    <text x="20" y="68" text-anchor="middle" fill="#94a3b8" font-size="9">-160 dBW</text>
  </g>

  <!-- Arrow from satellite -->
  <line x1="70" y1="130" x2="100" y2="160" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="65" y="155" fill="#ef4444" font-size="9" opacity="0.8">-186 dB</text>

  <!-- Component blocks -->
  <!-- Antenna -->
  <g transform="translate(100, 120)">
    <rect width="100" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="50" y="30" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Antenna</text>
    <text x="50" y="48" text-anchor="middle" fill="#e2e8f0" font-size="20">📡</text>
    <text x="50" y="70" text-anchor="middle" fill="#94a3b8" font-size="9">+3–6 dBi</text>
    <rect x="15" y="82" width="70" height="18" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="0.5"/>
    <text x="50" y="95" text-anchor="middle" fill="#60a5fa" font-size="9">RHCP / Linear</text>
  </g>

  <!-- Arrow -->
  <line x1="200" y1="160" x2="230" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="215" y="152" text-anchor="middle" fill="#4ade80" font-size="9">-127 dBm</text>

  <!-- LNA -->
  <g transform="translate(232, 120)">
    <rect width="100" height="80" rx="8" fill="#1e3a2f" stroke="#4ade80" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">LNA</text>
    <text x="50" y="46" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">+19 dB</text>
    <text x="50" y="62" text-anchor="middle" fill="#fbbf24" font-size="10">NF: 0.8 dB</text>
    <text x="50" y="75" text-anchor="middle" fill="#94a3b8" font-size="9">IIP3: -1.1 dBm</text>
    <rect x="8" y="82" width="84" height="18" rx="4" fill="#1e293b" stroke="#4ade80" stroke-width="0.5"/>
    <text x="50" y="95" text-anchor="middle" fill="#4ade80" font-size="9">Most Critical Stage</text>
  </g>

  <!-- Arrow -->
  <line x1="332" y1="160" x2="362" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="347" y="152" text-anchor="middle" fill="#4ade80" font-size="9">-108 dBm</text>

  <!-- SAW Filter -->
  <g transform="translate(364, 120)">
    <rect width="100" height="80" rx="8" fill="#3b1e3f" stroke="#c084fc" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">SAW Filter</text>
    <text x="50" y="46" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">-2 dB</text>
    <text x="50" y="62" text-anchor="middle" fill="#94a3b8" font-size="10">Insertion loss</text>
    <text x="50" y="75" text-anchor="middle" fill="#c084fc" font-size="9">OOB: ≥60 dB</text>
    <rect x="8" y="82" width="84" height="18" rx="4" fill="#1e293b" stroke="#c084fc" stroke-width="0.5"/>
    <text x="50" y="95" text-anchor="middle" fill="#c084fc" font-size="9">Rejects Interferers</text>
  </g>

  <!-- Arrow -->
  <line x1="464" y1="160" x2="494" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="479" y="152" text-anchor="middle" fill="#4ade80" font-size="9">-110 dBm</text>

  <!-- Mixer -->
  <g transform="translate(496, 120)">
    <rect width="100" height="80" rx="8" fill="#3f2e1e" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">Mixer + LO</text>
    <text x="50" y="46" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">+35 dB</text>
    <text x="50" y="62" text-anchor="middle" fill="#94a3b8" font-size="10">Downconvert</text>
    <text x="50" y="75" text-anchor="middle" fill="#fbbf24" font-size="9">RF → IF</text>
    <rect x="8" y="82" width="84" height="18" rx="4" fill="#1e293b" stroke="#fbbf24" stroke-width="0.5"/>
    <text x="50" y="95" text-anchor="middle" fill="#fbbf24" font-size="9">Image Rejection</text>
  </g>

  <!-- Arrow -->
  <line x1="596" y1="160" x2="626" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="611" y="152" text-anchor="middle" fill="#4ade80" font-size="9">-75 dBm</text>

  <!-- PGA + AGC -->
  <g transform="translate(628, 120)">
    <rect width="100" height="80" rx="8" fill="#1e3a3f" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">PGA + AGC</text>
    <text x="50" y="46" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">0–60 dB</text>
    <text x="50" y="62" text-anchor="middle" fill="#94a3b8" font-size="10">Variable gain</text>
    <text x="50" y="75" text-anchor="middle" fill="#22d3ee" font-size="9">Feedback loop</text>
    <rect x="8" y="82" width="84" height="18" rx="4" fill="#1e293b" stroke="#22d3ee" stroke-width="0.5"/>
    <text x="50" y="95" text-anchor="middle" fill="#22d3ee" font-size="9">Optimizes k = L/σ</text>
  </g>

  <!-- Arrow -->
  <line x1="728" y1="160" x2="758" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="743" y="152" text-anchor="middle" fill="#4ade80" font-size="9">-20 dBm</text>

  <!-- ADC -->
  <g transform="translate(760, 120)">
    <rect width="100" height="80" rx="8" fill="#3f1e1e" stroke="#f87171" stroke-width="1.5"/>
    <text x="50" y="25" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">ADC</text>
    <text x="50" y="46" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">2–3 bit</text>
    <text x="50" y="62" text-anchor="middle" fill="#94a3b8" font-size="10">~1.5 dB loss</text>
    <text x="50" y="75" text-anchor="middle" fill="#f87171" font-size="9">I/Q output</text>
    <rect x="8" y="82" width="84" height="18" rx="4" fill="#1e293b" stroke="#f87171" stroke-width="0.5"/>
    <text x="50" y="95" text-anchor="middle" fill="#f87171" font-size="9">Digital Samples</text>
  </g>

  <!-- Arrow to baseband -->
  <line x1="860" y1="160" x2="890" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Baseband -->
  <g transform="translate(892, 130)">
    <rect width="80" height="60" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="40" y="25" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Baseband</text>
    <text x="40" y="42" text-anchor="middle" fill="#94a3b8" font-size="9">Correlator</text>
    <text x="40" y="55" text-anchor="middle" fill="#94a3b8" font-size="9">→ Position</text>
  </g>

  <!-- Gain annotation bar -->
  <g transform="translate(100, 280)">
    <text x="0" y="0" fill="#94a3b8" font-size="10">Cumulative Gain:</text>
    <!-- Gain segments -->
    <rect x="0" y="8" width="100" height="12" rx="2" fill="#3b82f6" opacity="0.3"/>
    <text x="50" y="18" text-anchor="middle" fill="#93c5fd" font-size="8">+3 dBi</text>

    <rect x="132" y="8" width="100" height="12" rx="2" fill="#4ade80" opacity="0.3"/>
    <text x="182" y="18" text-anchor="middle" fill="#86efac" font-size="8">+22 dB</text>

    <rect x="264" y="8" width="100" height="12" rx="2" fill="#c084fc" opacity="0.15"/>
    <text x="314" y="18" text-anchor="middle" fill="#d8b4fe" font-size="8">+20 dB</text>

    <rect x="396" y="8" width="100" height="12" rx="2" fill="#fbbf24" opacity="0.3"/>
    <text x="446" y="18" text-anchor="middle" fill="#fde68a" font-size="8">+55 dB</text>

    <rect x="528" y="8" width="100" height="12" rx="2" fill="#22d3ee" opacity="0.3"/>
    <text x="578" y="18" text-anchor="middle" fill="#67e8f9" font-size="8">~+110 dB</text>

    <rect x="660" y="8" width="100" height="12" rx="2" fill="#f87171" opacity="0.3"/>
    <text x="710" y="18" text-anchor="middle" fill="#fca5a5" font-size="8">~+108 dB net</text>
  </g>

  <!-- NF annotation -->
  <g transform="translate(100, 320)">
    <text x="0" y="0" fill="#fbbf24" font-size="10">System NF (Friis):</text>
    <text x="0" y="16" fill="#94a3b8" font-size="10">NF</text>
    <text x="17" y="16" fill="#94a3b8" font-size="7" dy="-3">total</text>
    <text x="40" y="16" fill="#94a3b8" font-size="10">= NF₁ + (NF₂-1)/G₁ + (NF₃-1)/(G₁·G₂) + ...</text>

    <rect x="410" y="2" width="180" height="22" rx="4" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="0.5"/>
    <text x="500" y="17" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">LNA dominates NF → 0.8 dB + ε ≈ 1.4 dB</text>
  </g>

  <!-- Footer note -->
  <text x="500" y="505" text-anchor="middle" fill="#64748b" font-size="10">Values based on MAX2769C RF front-end IC with passive antenna configuration</text>
</svg>