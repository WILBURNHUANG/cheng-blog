<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <radialGradient id="antennaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" rx="12" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">GNSS Antenna Parameters — What Matters and Why</text>

  <!-- Central antenna illustration -->
  <g transform="translate(420, 160)">
    <circle cx="30" cy="30" r="80" fill="url(#antennaGlow)"/>
    <!-- Antenna body -->
    <rect x="5" y="20" width="50" height="30" rx="4" fill="#334155" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="15" y="10" width="30" height="12" rx="2" fill="#475569" stroke="#60a5fa" stroke-width="1"/>
    <line x1="30" y1="50" x2="30" y2="70" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="30" cy="73" r="4" fill="#334155" stroke="#60a5fa" stroke-width="1"/>

    <!-- Signal waves -->
    <path d="M-20,-30 Q30,-60 80,-30" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.4"/>
    <path d="M-30,-45 Q30,-80 90,-45" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
    <path d="M-40,-60 Q30,-100 100,-60" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.2"/>

    <!-- RHCP rotation arrow -->
    <path d="M65,-10 A20,20 0 1,1 65,15" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <polygon points="65,15 60,8 70,10" fill="#fbbf24"/>
    <text x="90" y="5" fill="#fbbf24" font-size="10" font-weight="600">RHCP</text>
  </g>

  <!-- Parameter cards arranged around center -->

  <!-- Card 1: Gain (top-left) -->
  <g transform="translate(30, 70)">
    <rect width="170" height="130" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
    <rect width="170" height="28" rx="8" fill="#4ade80" opacity="0.15"/>
    <text x="15" y="19" fill="#4ade80" font-size="12" font-weight="700">Gain (dBi)</text>
    <text x="15" y="48" fill="#e2e8f0" font-size="10">Peak: 3–9 dBi</text>
    <text x="15" y="65" fill="#94a3b8" font-size="10">Roll-off to horizon:</text>
    <text x="15" y="80" fill="#94a3b8" font-size="10">10–20 dB typical</text>
    <line x1="15" y1="90" x2="155" y2="90" stroke="#334155" stroke-width="0.5"/>
    <text x="15" y="108" fill="#fbbf24" font-size="9">Impact: Sets baseline signal</text>
    <text x="15" y="122" fill="#fbbf24" font-size="9">level for entire chain</text>
    <!-- Connector line -->
    <line x1="170" y1="100" x2="380" y2="150" stroke="#4ade80" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>
  </g>

  <!-- Card 2: Axial Ratio (top-right) -->
  <g transform="translate(700, 70)">
    <rect width="170" height="130" rx="8" fill="#1e293b" stroke="#f472b6" stroke-width="1"/>
    <rect width="170" height="28" rx="8" fill="#f472b6" opacity="0.15"/>
    <text x="15" y="19" fill="#f472b6" font-size="12" font-weight="700">Axial Ratio (dB)</text>
    <text x="15" y="48" fill="#e2e8f0" font-size="10">Perfect: 0 dB</text>
    <text x="15" y="65" fill="#e2e8f0" font-size="10">Good: &lt; 3 dB</text>
    <text x="15" y="80" fill="#94a3b8" font-size="10">Measures RHCP purity</text>
    <line x1="15" y1="90" x2="155" y2="90" stroke="#334155" stroke-width="0.5"/>
    <text x="15" y="108" fill="#fbbf24" font-size="9">Impact: Multipath rejection</text>
    <text x="15" y="122" fill="#fbbf24" font-size="9">Lower = better LHCP rejection</text>
    <line x1="0" y1="100" x2="-170" y2="150" stroke="#f472b6" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>
  </g>

  <!-- Card 3: VSWR (middle-left) -->
  <g transform="translate(30, 240)">
    <rect width="170" height="120" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
    <rect width="170" height="28" rx="8" fill="#22d3ee" opacity="0.15"/>
    <text x="15" y="19" fill="#22d3ee" font-size="12" font-weight="700">VSWR</text>
    <text x="15" y="48" fill="#e2e8f0" font-size="10">Target: ≤ 1.5:1</text>
    <text x="15" y="65" fill="#94a3b8" font-size="10">1.5:1 → 4% reflected</text>
    <text x="15" y="80" fill="#94a3b8" font-size="10">2.0:1 → 11% reflected</text>
    <line x1="15" y1="90" x2="155" y2="90" stroke="#334155" stroke-width="0.5"/>
    <text x="15" y="108" fill="#fbbf24" font-size="9">Impact: Power delivery</text>
    <line x1="170" y1="60" x2="380" y2="160" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>
  </g>

  <!-- Card 4: Phase Center (middle-right) -->
  <g transform="translate(700, 240)">
    <rect width="170" height="120" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
    <rect width="170" height="28" rx="8" fill="#a78bfa" opacity="0.15"/>
    <text x="15" y="19" fill="#a78bfa" font-size="12" font-weight="700">Phase Center</text>
    <text x="15" y="48" fill="#e2e8f0" font-size="10">PCO: static offset (mm)</text>
    <text x="15" y="65" fill="#e2e8f0" font-size="10">PCV: varies with angle</text>
    <text x="15" y="80" fill="#94a3b8" font-size="10">ANTEX calibration files</text>
    <line x1="15" y1="90" x2="155" y2="90" stroke="#334155" stroke-width="0.5"/>
    <text x="15" y="108" fill="#fbbf24" font-size="9">Impact: mm-level for survey</text>
    <line x1="0" y1="60" x2="-170" y2="160" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>
  </g>

  <!-- Card 5: Bandwidth (bottom-left) -->
  <g transform="translate(30, 400)">
    <rect width="170" height="120" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1"/>
    <rect width="170" height="28" rx="8" fill="#fb923c" opacity="0.15"/>
    <text x="15" y="19" fill="#fb923c" font-size="12" font-weight="700">Bandwidth</text>
    <text x="15" y="48" fill="#e2e8f0" font-size="10">L1: 1559–1606 MHz</text>
    <text x="15" y="65" fill="#e2e8f0" font-size="10">L2: 1215–1255 MHz</text>
    <text x="15" y="80" fill="#e2e8f0" font-size="10">L5: 1164–1189 MHz</text>
    <line x1="15" y1="90" x2="155" y2="90" stroke="#334155" stroke-width="0.5"/>
    <text x="15" y="108" fill="#fbbf24" font-size="9">Impact: Multi-constellation,</text>
    <text x="15" y="120" fill="#fbbf24" font-size="9">iono-free combinations</text>
  </g>

  <!-- Card 6: Group Delay (bottom-right) -->
  <g transform="translate(700, 400)">
    <rect width="170" height="120" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
    <rect width="170" height="28" rx="8" fill="#94a3b8" opacity="0.15"/>
    <text x="15" y="19" fill="#cbd5e1" font-size="12" font-weight="700">Group Delay</text>
    <text x="15" y="48" fill="#e2e8f0" font-size="10">Target: &lt; 20 ns</text>
    <text x="15" y="65" fill="#94a3b8" font-size="10">1 ns ≈ 0.3 m range error</text>
    <text x="15" y="80" fill="#94a3b8" font-size="10">Varies with direction</text>
    <line x1="15" y1="90" x2="155" y2="90" stroke="#334155" stroke-width="0.5"/>
    <text x="15" y="108" fill="#fbbf24" font-size="9">Impact: Pseudorange bias</text>
    <text x="15" y="120" fill="#fbbf24" font-size="9">per satellite elevation</text>
  </g>

  <!-- Center comparison: RHCP vs Linear -->
  <g transform="translate(280, 310)">
    <rect width="340" height="100" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
    <text x="170" y="22" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">Polarization Comparison</text>

    <!-- RHCP -->
    <g transform="translate(20, 35)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#4ade80" stroke-width="1.5"/>
      <path d="M12,2 A10,10 0 1,1 2,12" fill="none" stroke="#4ade80" stroke-width="2"/>
      <text x="30" y="10" fill="#4ade80" font-size="11" font-weight="600">RHCP Antenna</text>
      <text x="30" y="26" fill="#94a3b8" font-size="9">Direct: full power | Reflected: rejected</text>
      <text x="30" y="40" fill="#4ade80" font-size="9">Best for precision GNSS</text>
    </g>

    <!-- Linear -->
    <g transform="translate(20, 75)">
      <line x1="2" y1="2" x2="22" y2="2" stroke="#ef4444" stroke-width="2"/>
      <text x="30" y="7" fill="#ef4444" font-size="11" font-weight="600">Linear Antenna</text>
      <text x="30" y="21" fill="#94a3b8" font-size="9">-3 dB on direct signal | No multipath rejection</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="450" y="565" text-anchor="middle" fill="#64748b" font-size="10">Reference antenna: Quectel YEGR001W8AH — Multi-band active GNSS antenna (L1/L2/L5/L-band)</text>
</svg>