<svg viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Space Grotesk',sans-serif">
  <defs>
    <linearGradient id="bgVI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1530"/>
      <stop offset="100%" stop-color="#050A19"/>
    </linearGradient>
    <marker id="arVI" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#5CE1FF"/></marker>
    <marker id="arViMuted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#9DB4D8"/></marker>
  </defs>
  <rect width="1000" height="470" rx="16" fill="url(#bgVI)" stroke="#5CE1FF" stroke-opacity="0.25"/>

  <text x="500" y="44" text-anchor="middle" font-size="23" font-weight="700" fill="#F1F5FF">Vertical integration comes for LEO-PNT</text>
  <line x1="500" y1="66" x2="500" y2="430" stroke="#5CE1FF" stroke-opacity="0.18" stroke-dasharray="5,6"/>

  <!-- LEFT: fragmented chain -->
  <text x="250" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#9DB4D8" letter-spacing="2">YESTERDAY · FOUR COMPANIES, FOUR HANDOFFS</text>

  <g font-size="12" fill="#F1F5FF">
    <rect x="130" y="118" width="240" height="38" rx="8" fill="#13243f" stroke="#9DB4D8" stroke-width="1.3"/>
    <text x="250" y="141" text-anchor="middle">Launch provider</text>

    <rect x="130" y="176" width="240" height="38" rx="8" fill="#13243f" stroke="#9DB4D8" stroke-width="1.3"/>
    <text x="250" y="199" text-anchor="middle">Satellite manufacturer</text>

    <rect x="130" y="234" width="240" height="38" rx="8" fill="#13243f" stroke="#9DB4D8" stroke-width="1.3"/>
    <text x="250" y="257" text-anchor="middle">Constellation operator</text>

    <rect x="130" y="292" width="240" height="38" rx="8" fill="#13243f" stroke="#9DB4D8" stroke-width="1.3"/>
    <text x="250" y="315" text-anchor="middle">PNT / comms service</text>
  </g>
  <line x1="250" y1="156" x2="250" y2="176" stroke="#9DB4D8" stroke-width="1.6" marker-end="url(#arViMuted)"/>
  <line x1="250" y1="214" x2="250" y2="234" stroke="#9DB4D8" stroke-width="1.6" marker-end="url(#arViMuted)"/>
  <line x1="250" y1="272" x2="250" y2="292" stroke="#9DB4D8" stroke-width="1.6" marker-end="url(#arViMuted)"/>

  <rect x="120" y="368" width="260" height="42" rx="8" fill="#0F1D3D" stroke="#9DB4D8" stroke-opacity="0.4"/>
  <text x="250" y="386" text-anchor="middle" font-size="12" fill="#9DB4D8">Every handoff is a contract,</text>
  <text x="250" y="402" text-anchor="middle" font-size="12" fill="#9DB4D8">a schedule risk, a margin stack</text>

  <!-- RIGHT: integrated stack -->
  <text x="750" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#5CE1FF" letter-spacing="2">NOW · ONE COMPANY, PAD TO SIGNAL</text>

  <rect x="630" y="118" width="240" height="212" rx="14" fill="#0F1D3D" stroke="#5CE1FF" stroke-width="1.8"/>
  <text x="750" y="144" text-anchor="middle" font-size="13" font-weight="700" fill="#F1F5FF">Rocket Lab + Iridium</text>
  <line x1="655" y1="156" x2="845" y2="156" stroke="#5CE1FF" stroke-opacity="0.3"/>

  <text x="750" y="180" text-anchor="middle" font-size="12" fill="#5CE1FF">Neutron / Electron launch</text>
  <text x="750" y="206" text-anchor="middle" font-size="12" fill="#5CE1FF">Satellite manufacturing</text>
  <text x="750" y="232" text-anchor="middle" font-size="12" fill="#5CE1FF">Iridium LEO constellation</text>
  <text x="750" y="258" text-anchor="middle" font-size="12" fill="#5CE1FF">Iridium STL · PNT + D2D service</text>
  <text x="750" y="292" text-anchor="middle" font-size="11" fill="#9DB4D8">~$8.0B enterprise value</text>
  <text x="750" y="309" text-anchor="middle" font-size="11" fill="#9DB4D8">close expected mid-2027</text>

  <rect x="620" y="368" width="260" height="42" rx="8" fill="#0F1D3D" stroke="#5CE1FF" stroke-opacity="0.5"/>
  <text x="750" y="386" text-anchor="middle" font-size="12" fill="#F1F5FF">One roadmap from rocket</text>
  <text x="750" y="402" text-anchor="middle" font-size="12" fill="#F1F5FF">to resilient PNT signal</text>

  <text x="500" y="450" text-anchor="middle" font-size="12" fill="#9DB4D8" font-style="italic">Iridium STL is today's only operational commercial LEO-PNT service — now paired with its own ride to orbit</text>
</svg>
