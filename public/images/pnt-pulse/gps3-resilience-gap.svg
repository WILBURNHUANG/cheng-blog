<svg viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Space Grotesk',sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1530"/>
      <stop offset="100%" stop-color="#050A19"/>
    </linearGradient>
    <radialGradient id="jam3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5a5a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff5a5a" stop-opacity="0"/>
    </radialGradient>
    <marker id="ar3" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#5CE1FF"/></marker>
  </defs>
  <rect width="1000" height="470" rx="16" fill="url(#bg3)" stroke="#5CE1FF" stroke-opacity="0.25"/>

  <text x="500" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="#F1F5FF">GPS III is complete. The resilience layer isn't.</text>

  <!-- Top: completed GPS III constellation arc -->
  <path d="M120 150 Q500 70 880 150" fill="none" stroke="#5CE1FF" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="6,5"/>
  <g fill="#13243f" stroke="#5CE1FF" stroke-width="1.6">
    <g transform="translate(180,138)"><rect x="-12" y="-8" width="24" height="16" rx="3"/></g>
    <g transform="translate(290,112)"><rect x="-12" y="-8" width="24" height="16" rx="3"/></g>
    <g transform="translate(400,96)"><rect x="-12" y="-8" width="24" height="16" rx="3"/></g>
    <g transform="translate(500,90)"><rect x="-12" y="-8" width="24" height="16" rx="3"/></g>
    <g transform="translate(600,96)"><rect x="-12" y="-8" width="24" height="16" rx="3"/></g>
    <g transform="translate(710,112)"><rect x="-12" y="-8" width="24" height="16" rx="3"/></g>
    <g transform="translate(820,138)"><rect x="-12" y="-8" width="24" height="16" rx="3"/></g>
  </g>
  <text x="500" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#5CE1FF">✓ 10/10 GPS III satellites on orbit — M-code: 3× accuracy, 8× anti-jam</text>

  <!-- Middle: the gap (defunded R-GPS) -->
  <g transform="translate(0,40)">
    <rect x="250" y="210" width="500" height="60" rx="10" fill="#0F1D3D" stroke="#ff7a7a" stroke-opacity="0.6" stroke-dasharray="7,5"/>
    <text x="500" y="236" text-anchor="middle" font-size="15" font-weight="600" fill="#ff9a9a">Resilient GPS (R-GPS) augmentation layer</text>
    <text x="500" y="257" text-anchor="middle" font-size="13" fill="#9DB4D8">small LEO/MEO smallsats to harden PNT — defunded in the FY2026 budget</text>
    <line x1="270" y1="215" x2="730" y2="265" stroke="#ff7a7a" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Bottom: ground users under jamming -->
  <circle cx="500" cy="410" r="120" fill="url(#jam3)" opacity="0.5"/>
  <rect x="360" y="392" width="280" height="44" rx="8" fill="#0F1D3D" stroke="#5CE1FF" stroke-opacity="0.5"/>
  <text x="500" y="412" text-anchor="middle" font-size="13" fill="#F1F5FF">Warfighters &amp; critical infra —</text>
  <text x="500" y="429" text-anchor="middle" font-size="13" fill="#F1F5FF">still facing a rising jamming epidemic</text>

  <line x1="430" y1="320" x2="470" y2="388" stroke="#5CE1FF" stroke-width="2" marker-end="url(#ar3)" opacity="0.8"/>
  <line x1="570" y1="320" x2="530" y2="388" stroke="#5CE1FF" stroke-width="2" marker-end="url(#ar3)" opacity="0.8"/>

  <text x="500" y="462" text-anchor="middle" font-size="12" fill="#9DB4D8" font-style="italic">Congress is pushing to revive the resilience plan the Space Force tried to cancel.</text>
</svg>
