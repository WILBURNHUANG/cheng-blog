<svg viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Space Grotesk',sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1530"/>
      <stop offset="100%" stop-color="#050A19"/>
    </linearGradient>
    <marker id="ar" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#5CE1FF"/></marker>
    <marker id="arUp" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#9DB4D8"/></marker>
  </defs>
  <rect width="1000" height="470" rx="16" fill="url(#bg2)" stroke="#5CE1FF" stroke-opacity="0.25"/>

  <text x="500" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#F1F5FF">The LEO flip: from GNSS consumer to PNT source</text>
  <line x1="500" y1="70" x2="500" y2="430" stroke="#5CE1FF" stroke-opacity="0.18" stroke-dasharray="5,6"/>

  <!-- LEFT: yesterday -->
  <text x="250" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="#9DB4D8" letter-spacing="3">YESTERDAY · LEO = DEMAND</text>

  <!-- MEO GNSS top -->
  <g transform="translate(250,140)">
    <rect x="-18" y="-12" width="36" height="24" rx="3" fill="#13243f" stroke="#9DB4D8" stroke-width="1.5"/>
    <rect x="-40" y="-8" width="18" height="16" fill="#2563eb" opacity="0.6"/><rect x="22" y="-8" width="18" height="16" fill="#2563eb" opacity="0.6"/>
  </g>
  <text x="250" y="128" text-anchor="middle" font-size="12" fill="#9DB4D8">MEO GNSS (GPS / Galileo)</text>
  <!-- LEO sat consuming GNSS -->
  <g transform="translate(250,250)">
    <rect x="-15" y="-10" width="30" height="20" rx="3" fill="#13243f" stroke="#9DB4D8" stroke-width="1.4"/>
  </g>
  <text x="250" y="285" text-anchor="middle" font-size="12" fill="#9DB4D8">LEO comms sat (just a user)</text>
  <line x1="250" y1="155" x2="250" y2="238" stroke="#9DB4D8" stroke-width="2" marker-end="url(#arUp)" opacity="0.8"/>
  <text x="312" y="205" font-size="12" fill="#9DB4D8">uses GPS for</text>
  <text x="312" y="221" font-size="12" fill="#9DB4D8">its own fix</text>
  <!-- ground -->
  <rect x="120" y="370" width="260" height="40" rx="8" fill="#0F1D3D" stroke="#9DB4D8" stroke-opacity="0.4"/>
  <text x="250" y="395" text-anchor="middle" font-size="13" fill="#9DB4D8">Receivers trust one faint MEO signal</text>

  <!-- RIGHT: today -->
  <text x="750" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="#5CE1FF" letter-spacing="3">NOW · LEO = PNT SOURCE</text>

  <!-- MEO GNSS still up top -->
  <g transform="translate(660,140)">
    <rect x="-16" y="-11" width="32" height="22" rx="3" fill="#13243f" stroke="#5CE1FF" stroke-width="1.4"/>
  </g>
  <text x="660" y="126" text-anchor="middle" font-size="11" fill="#9DB4D8">MEO GNSS</text>

  <!-- LEO PNT broadcasters -->
  <g transform="translate(780,165)">
    <rect x="-18" y="-12" width="36" height="24" rx="3" fill="#13243f" stroke="#5CE1FF" stroke-width="1.8"/>
    <rect x="-40" y="-8" width="18" height="16" fill="#5CE1FF" opacity="0.4"/><rect x="22" y="-8" width="18" height="16" fill="#5CE1FF" opacity="0.4"/>
  </g>
  <g transform="translate(870,210)">
    <rect x="-15" y="-10" width="30" height="20" rx="3" fill="#13243f" stroke="#5CE1FF" stroke-width="1.6"/>
  </g>
  <text x="828" y="252" text-anchor="middle" font-size="12" fill="#5CE1FF">LEO-PNT (Xona, Celeste, TrustPoint)</text>

  <!-- beams down -->
  <line x1="660" y1="155" x2="745" y2="365" stroke="#5CE1FF" stroke-width="2" marker-end="url(#ar)" opacity="0.85"/>
  <line x1="780" y1="180" x2="755" y2="365" stroke="#5CE1FF" stroke-width="2.4" marker-end="url(#ar)"/>
  <line x1="870" y1="222" x2="775" y2="365" stroke="#5CE1FF" stroke-width="2.4" marker-end="url(#ar)"/>

  <rect x="620" y="370" width="260" height="40" rx="8" fill="#0F1D3D" stroke="#5CE1FF" stroke-opacity="0.5"/>
  <text x="750" y="389" text-anchor="middle" font-size="13" fill="#F1F5FF">Stronger, multi-layer signals →</text>
  <text x="750" y="405" text-anchor="middle" font-size="13" fill="#F1F5FF">faster fix, harder to jam</text>

  <text x="500" y="450" text-anchor="middle" font-size="12" fill="#9DB4D8" font-style="italic">~1,000× stronger at the ground than MEO GNSS, and a fresh layer of geometry for anti-jam resilience</text>
</svg>
