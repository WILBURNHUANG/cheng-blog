<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" /><stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444" /><stop offset="100%" style="stop-color:#dc2626" />
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6" /><stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6" /><stop offset="100%" style="stop-color:#2563eb" />
    </linearGradient>
    <linearGradient id="step5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981" /><stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569" />
    </marker>
  </defs>

  <rect width="800" height="340" fill="url(#bg2)" rx="12"/>
  <text x="400" y="40" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">The PCBA Process: From Bare Board to Working Circuit</text>

  <!-- Step 1 -->
  <rect x="30" y="75" width="130" height="180" rx="10" fill="url(#step1)" filter="url(#sh2)"/>
  <circle cx="95" cy="100" r="14" fill="#92400e"/>
  <text x="95" y="105" text-anchor="middle" fill="#fef3c7" font-size="14" font-weight="700">1</text>
  <text x="95" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Solder</text>
  <text x="95" y="152" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Paste</text>
  <text x="95" y="178" text-anchor="middle" fill="#fef3c7" font-size="10">Stencil prints</text>
  <text x="95" y="193" text-anchor="middle" fill="#fef3c7" font-size="10">paste onto</text>
  <text x="95" y="208" text-anchor="middle" fill="#fef3c7" font-size="10">PCB pads</text>

  <!-- Arrow 1-2 -->
  <line x1="165" y1="165" x2="185" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="190" y="75" width="130" height="180" rx="10" fill="url(#step2)" filter="url(#sh2)"/>
  <circle cx="255" cy="100" r="14" fill="#7f1d1d"/>
  <text x="255" y="105" text-anchor="middle" fill="#fecaca" font-size="14" font-weight="700">2</text>
  <text x="255" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Component</text>
  <text x="255" y="152" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Placement</text>
  <text x="255" y="178" text-anchor="middle" fill="#fecaca" font-size="10">Pick-and-place</text>
  <text x="255" y="193" text-anchor="middle" fill="#fecaca" font-size="10">machines mount</text>
  <text x="255" y="208" text-anchor="middle" fill="#fecaca" font-size="10">SMD parts</text>

  <!-- Arrow 2-3 -->
  <line x1="325" y1="165" x2="345" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="350" y="75" width="130" height="180" rx="10" fill="url(#step3)" filter="url(#sh2)"/>
  <circle cx="415" cy="100" r="14" fill="#4c1d95"/>
  <text x="415" y="105" text-anchor="middle" fill="#ddd6fe" font-size="14" font-weight="700">3</text>
  <text x="415" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Reflow</text>
  <text x="415" y="152" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Soldering</text>
  <text x="415" y="178" text-anchor="middle" fill="#ddd6fe" font-size="10">Board passes</text>
  <text x="415" y="193" text-anchor="middle" fill="#ddd6fe" font-size="10">through oven</text>
  <text x="415" y="208" text-anchor="middle" fill="#ddd6fe" font-size="10">to melt solder</text>

  <!-- Arrow 3-4 -->
  <line x1="485" y1="165" x2="505" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="510" y="75" width="130" height="180" rx="10" fill="url(#step4)" filter="url(#sh2)"/>
  <circle cx="575" cy="100" r="14" fill="#1e3a5f"/>
  <text x="575" y="105" text-anchor="middle" fill="#bfdbfe" font-size="14" font-weight="700">4</text>
  <text x="575" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Inspection</text>
  <text x="575" y="152" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">&amp; Testing</text>
  <text x="575" y="178" text-anchor="middle" fill="#bfdbfe" font-size="10">AOI, X-ray,</text>
  <text x="575" y="193" text-anchor="middle" fill="#bfdbfe" font-size="10">and functional</text>
  <text x="575" y="208" text-anchor="middle" fill="#bfdbfe" font-size="10">testing</text>

  <!-- Arrow 4-5 -->
  <line x1="645" y1="165" x2="665" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="670" y="75" width="105" height="180" rx="10" fill="url(#step5)" filter="url(#sh2)"/>
  <circle cx="722" cy="100" r="14" fill="#064e3b"/>
  <text x="722" y="105" text-anchor="middle" fill="#a7f3d0" font-size="14" font-weight="700">5</text>
  <text x="722" y="135" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Final</text>
  <text x="722" y="152" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">PCBA</text>
  <text x="722" y="178" text-anchor="middle" fill="#a7f3d0" font-size="10">Complete</text>
  <text x="722" y="193" text-anchor="middle" fill="#a7f3d0" font-size="10">assembled</text>
  <text x="722" y="208" text-anchor="middle" fill="#a7f3d0" font-size="10">board</text>

  <!-- Bottom labels -->
  <rect x="30" y="280" width="370" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="215" y="305" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="600">SMT (Surface Mount Technology)</text>

  <rect x="430" y="280" width="345" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="602" y="305" text-anchor="middle" fill="#10b981" font-size="12" font-weight="600">THT (Through-Hole Technology) may follow</text>
</svg>