<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="mcpBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="areaGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="url(#mcpBg)"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold">MCP Ecosystem Explosion</text>
  <text x="350" y="55" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="12">Server Downloads: Nov 2024 - Apr 2025</text>

  <!-- Chart area -->
  <rect x="80" y="80" width="540" height="250" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="80" y1="130" x2="620" y2="130" stroke="#333" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="180" x2="620" y2="180" stroke="#333" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="230" x2="620" y2="230" stroke="#333" stroke-width="1" stroke-dasharray="4"/>
  <line x1="80" y1="280" x2="620" y2="280" stroke="#333" stroke-width="1" stroke-dasharray="4"/>

  <!-- Y-axis labels -->
  <text x="70" y="85" text-anchor="end" fill="#666" font-family="system-ui, sans-serif" font-size="11">8M</text>
  <text x="70" y="135" text-anchor="end" fill="#666" font-family="system-ui, sans-serif" font-size="11">6M</text>
  <text x="70" y="185" text-anchor="end" fill="#666" font-family="system-ui, sans-serif" font-size="11">4M</text>
  <text x="70" y="235" text-anchor="end" fill="#666" font-family="system-ui, sans-serif" font-size="11">2M</text>
  <text x="70" y="285" text-anchor="end" fill="#666" font-family="system-ui, sans-serif" font-size="11">0</text>
  <text x="70" y="330" text-anchor="end" fill="#666" font-family="system-ui, sans-serif" font-size="10">100K</text>

  <!-- Area fill -->
  <path d="M100 325 L190 320 L280 300 L370 260 L460 180 L550 100 L550 330 L100 330 Z" fill="url(#areaGrad)"/>

  <!-- Line chart -->
  <path d="M100 325 L190 320 L280 300 L370 260 L460 180 L550 100" fill="none" stroke="url(#barGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="100" cy="325" r="6" fill="#6366f1" stroke="#fff" stroke-width="2"/>
  <circle cx="190" cy="320" r="6" fill="#7c3aed" stroke="#fff" stroke-width="2"/>
  <circle cx="280" cy="300" r="6" fill="#8b5cf6" stroke="#fff" stroke-width="2"/>
  <circle cx="370" cy="260" r="6" fill="#9333ea" stroke="#fff" stroke-width="2"/>
  <circle cx="460" cy="180" r="6" fill="#a855f7" stroke="#fff" stroke-width="2"/>
  <circle cx="550" cy="100" r="6" fill="#c084fc" stroke="#fff" stroke-width="2"/>

  <!-- X-axis labels -->
  <text x="100" y="350" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">Nov 24</text>
  <text x="190" y="350" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">Dec 24</text>
  <text x="280" y="350" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">Jan 25</text>
  <text x="370" y="350" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">Feb 25</text>
  <text x="460" y="350" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">Mar 25</text>
  <text x="550" y="350" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">Apr 25</text>

  <!-- Value labels -->
  <text x="100" y="312" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">100K</text>
  <text x="550" y="88" text-anchor="middle" fill="#c084fc" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">8M+</text>

  <!-- Growth indicator -->
  <rect x="580" y="140" width="100" height="60" rx="6" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="630" y="165" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="20" font-weight="bold">80x</text>
  <text x="630" y="185" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="10">growth</text>

  <!-- Stats box -->
  <rect x="100" y="365" width="450" height="25" rx="4" fill="#1e1e3f"/>
  <text x="325" y="382" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="11">5,800+ servers  |  300+ clients  |  OpenAI, Google, Microsoft adopted</text>
</svg>