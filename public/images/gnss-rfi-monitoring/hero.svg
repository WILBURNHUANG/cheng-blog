<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Space Grotesk',sans-serif">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050A19"/>
      <stop offset="55%" stop-color="#0A1530"/>
      <stop offset="100%" stop-color="#0F1D3D"/>
    </linearGradient>
    <radialGradient id="jamGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5a5a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff5a5a" stop-opacity="0"/>
    </radialGradient>
    <marker id="ah" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0,9 3.5,0 7" fill="#5CE1FF"/></marker>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- stars -->
  <g fill="#F1F5FF" opacity="0.5">
    <circle cx="120" cy="70" r="1.5"/><circle cx="300" cy="40" r="1"/><circle cx="520" cy="90" r="1.4"/>
    <circle cx="760" cy="50" r="1"/><circle cx="980" cy="80" r="1.6"/><circle cx="1080" cy="40" r="1"/>
    <circle cx="660" cy="30" r="1.2"/><circle cx="200" cy="120" r="1"/>
  </g>

  <!-- GNSS satellites -->
  <g>
    <g transform="translate(180,150)">
      <rect x="-14" y="-9" width="28" height="18" rx="3" fill="#1e3a5f" stroke="#5CE1FF" stroke-width="1.5"/>
      <rect x="-34" y="-6" width="16" height="12" fill="#2563eb" opacity="0.7"/><rect x="18" y="-6" width="16" height="12" fill="#2563eb" opacity="0.7"/>
    </g>
    <g transform="translate(620,110)">
      <rect x="-14" y="-9" width="28" height="18" rx="3" fill="#1e3a5f" stroke="#5CE1FF" stroke-width="1.5"/>
      <rect x="-34" y="-6" width="16" height="12" fill="#2563eb" opacity="0.7"/><rect x="18" y="-6" width="16" height="12" fill="#2563eb" opacity="0.7"/>
    </g>
    <g transform="translate(1010,160)">
      <rect x="-14" y="-9" width="28" height="18" rx="3" fill="#1e3a5f" stroke="#5CE1FF" stroke-width="1.5"/>
      <rect x="-34" y="-6" width="16" height="12" fill="#2563eb" opacity="0.7"/><rect x="18" y="-6" width="16" height="12" fill="#2563eb" opacity="0.7"/>
    </g>
  </g>
  <!-- weak signals (thin dashed) -->
  <g stroke="#5CE1FF" stroke-width="1" opacity="0.45" stroke-dasharray="4 5" fill="none">
    <path d="M180 165 L470 470"/><path d="M620 128 L500 470"/><path d="M1010 178 L540 470"/>
  </g>
  <text x="700" y="200" fill="#9DB4D8" font-size="15">GNSS signals arrive near <tspan fill="#5CE1FF" font-weight="700">-127 dBm</tspan> — below the noise floor</text>

  <!-- ground line -->
  <rect x="0" y="470" width="1200" height="160" fill="#0A1530"/>
  <line x1="0" y1="470" x2="1200" y2="470" stroke="#1F3563" stroke-width="2"/>

  <!-- jammer -->
  <g transform="translate(500,470)">
    <circle cx="0" cy="-2" r="70" fill="url(#jamGlow)"/>
    <rect x="-10" y="-44" width="20" height="44" fill="#7f1d1d" stroke="#ff5a5a" stroke-width="1.5"/>
    <line x1="0" y1="-44" x2="0" y2="-78" stroke="#ff5a5a" stroke-width="2"/>
    <g stroke="#ff5a5a" stroke-width="2" fill="none" opacity="0.85">
      <path d="M-22 -78 q22 -16 44 0"/><path d="M-34 -90 q34 -24 68 0"/>
    </g>
    <text x="0" y="22" text-anchor="middle" fill="#ff8a8a" font-size="13" font-weight="700">~$50 jammer</text>
  </g>

  <!-- monitoring sensors triangulating -->
  <g>
    <g transform="translate(820,470)">
      <polygon points="0,-34 -16,0 16,0" fill="#0F1D3D" stroke="#34d399" stroke-width="2"/>
      <circle cx="0" cy="-20" r="4" fill="#34d399"/>
      <text x="0" y="22" text-anchor="middle" fill="#6ee7b7" font-size="12">sensor</text>
    </g>
    <g transform="translate(1010,470)">
      <polygon points="0,-34 -16,0 16,0" fill="#0F1D3D" stroke="#34d399" stroke-width="2"/>
      <circle cx="0" cy="-20" r="4" fill="#34d399"/>
      <text x="0" y="22" text-anchor="middle" fill="#6ee7b7" font-size="12">sensor</text>
    </g>
    <g transform="translate(660,560)">
      <polygon points="0,-34 -16,0 16,0" fill="#0F1D3D" stroke="#34d399" stroke-width="2"/>
      <circle cx="0" cy="-20" r="4" fill="#34d399"/>
    </g>
    <!-- TDOA lines toward jammer -->
    <g stroke="#34d399" stroke-width="1.6" stroke-dasharray="6 4" opacity="0.8" marker-end="url(#ah)">
      <path d="M804 452 L516 440" stroke="#34d399"/>
      <path d="M994 452 L520 442" stroke="#34d399"/>
      <path d="M652 538 L508 446" stroke="#34d399"/>
    </g>
  </g>

  <!-- title -->
  <text x="60" y="560" fill="#F1F5FF" font-family="'Space Grotesk',sans-serif" font-size="40" font-weight="700">Chasing the Jammer</text>
  <text x="60" y="595" fill="#9DB4D8" font-size="19">GNSS defense pivots from out-shouting interference to mapping it</text>
</svg>
