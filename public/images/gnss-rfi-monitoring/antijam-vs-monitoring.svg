<svg viewBox="0 0 820 430" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Space Grotesk',sans-serif">
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2a1414"/><stop offset="100%" stop-color="#1a0f1f"/></linearGradient>
    <linearGradient id="bgR" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0c2438"/><stop offset="100%" stop-color="#0a1f1c"/></linearGradient>
  </defs>
  <rect width="820" height="430" fill="#050A19"/>
  <text x="410" y="40" text-anchor="middle" fill="#F1F5FF" font-family="'Space Grotesk',sans-serif" font-size="22" font-weight="700">Two answers to the same threat</text>

  <!-- left: mitigation -->
  <g transform="translate(30,70)">
    <rect x="0" y="0" width="370" height="330" rx="12" fill="url(#bgL)" stroke="#7f1d1d" stroke-width="1.5"/>
    <text x="24" y="40" fill="#ff8a8a" font-size="17" font-weight="700">MITIGATION (anti-jam)</text>
    <text x="24" y="62" fill="#9DB4D8" font-size="12.5" font-style="italic">Protect my receiver, right now</text>
    <g fill="#F1F5FF" font-size="13.5">
      <text x="24" y="100">▸ CRPA nulls, filtering, sensor fusion</text>
      <text x="24" y="132">▸ <tspan fill="#ffb3b3">Local</tspan> &amp; reactive</text>
      <text x="24" y="164">▸ Capped at ~N−1 jammers</text>
      <text x="24" y="196">▸ Cost scales <tspan fill="#ffb3b3">per platform</tspan></text>
      <text x="24" y="228">▸ Says nothing about <tspan fill="#ffb3b3">who / where</tspan></text>
    </g>
    <rect x="24" y="258" width="322" height="48" rx="8" fill="#3b0f0f"/>
    <text x="185" y="288" text-anchor="middle" fill="#ffb3b3" font-size="13.5">Keeps the platform alive — and that's it</text>
  </g>

  <!-- right: monitoring -->
  <g transform="translate(420,70)">
    <rect x="0" y="0" width="370" height="330" rx="12" fill="url(#bgR)" stroke="#0e7490" stroke-width="1.5"/>
    <text x="24" y="40" fill="#5CE1FF" font-size="17" font-weight="700">MONITORING (awareness)</text>
    <text x="24" y="62" fill="#9DB4D8" font-size="12.5" font-style="italic">Detect, characterize, geolocate the source</text>
    <g fill="#F1F5FF" font-size="13.5">
      <text x="24" y="100">▸ Sensor networks: ground, CORS, LEO</text>
      <text x="24" y="132">▸ <tspan fill="#6ee7b7">Global</tspan> &amp; cumulative</text>
      <text x="24" y="164">▸ Scales with data, not hardware</text>
      <text x="24" y="196">▸ Outputs <tspan fill="#6ee7b7">intelligence</tspan>: when/where/waveform</text>
      <text x="24" y="228">▸ Can reach <tspan fill="#6ee7b7">attribution</tspan> — name the source</text>
    </g>
    <rect x="24" y="258" width="322" height="48" rx="8" fill="#062b2b"/>
    <text x="185" y="288" text-anchor="middle" fill="#6ee7b7" font-size="13.5">Turns an engineering loss into leverage</text>
  </g>
</svg>
