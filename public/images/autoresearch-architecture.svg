<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="prepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#172554"/>
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2a1e"/>
      <stop offset="100%" style="stop-color:#14532d"/>
    </linearGradient>
    <linearGradient id="progGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1f3d"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <marker id="arr1" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arr3" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#10b981"/>
    </marker>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bgGrad2)" rx="16"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700" letter-spacing="0.5">autoresearch — Three-File Architecture</text>
  <text x="400" y="56" text-anchor="middle" fill="#64748b" font-size="12">One-time setup · Agent's canvas · Human's strategy layer</text>

  <!-- ═══════════════ prepare.py card ═══════════════ -->
  <rect x="30" y="76" width="218" height="256" rx="12" fill="url(#prepGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow2)"/>
  <!-- Badge -->
  <rect x="30" y="76" width="218" height="36" rx="12" fill="#1d4ed8"/>
  <rect x="30" y="100" width="218" height="12" fill="#1d4ed8"/>
  <text x="139" y="100" text-anchor="middle" fill="#bfdbfe" font-size="13" font-weight="700">prepare.py</text>
  <text x="139" y="114" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">RUN ONCE · DO NOT TOUCH</text>

  <!-- Content -->
  <text x="50" y="140" fill="#e2e8f0" font-size="12" font-weight="600">What it does:</text>
  <text x="50" y="158" fill="#94a3b8" font-size="11">↓  Download FineWeb-Edu dataset</text>
  <text x="50" y="175" fill="#94a3b8" font-size="11">↓  Train BPE tokenizer</text>
  <text x="50" y="192" fill="#94a3b8" font-size="11">↓  Shard data to binary format</text>
  <text x="50" y="209" fill="#94a3b8" font-size="11">↓  Save tokenizer to disk</text>

  <!-- Divider -->
  <line x1="50" y1="222" x2="228" y2="222" stroke="#1e40af" stroke-width="1"/>

  <text x="50" y="240" fill="#e2e8f0" font-size="12" font-weight="600">Run time:</text>
  <text x="50" y="258" fill="#60a5fa" font-size="13" font-weight="700">~2 minutes</text>

  <text x="50" y="282" fill="#e2e8f0" font-size="12" font-weight="600">Agent access:</text>
  <rect x="50" y="292" width="80" height="22" rx="5" fill="#7f1d1d"/>
  <text x="90" y="307" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">READ ONLY</text>

  <!-- ═══════════════ train.py card ═══════════════ -->
  <rect x="291" y="76" width="218" height="256" rx="12" fill="url(#trainGrad)" stroke="#10b981" stroke-width="2" filter="url(#shadow2)"/>
  <!-- Badge -->
  <rect x="291" y="76" width="218" height="36" rx="12" fill="#065f46"/>
  <rect x="291" y="100" width="218" height="12" fill="#065f46"/>
  <text x="400" y="100" text-anchor="middle" fill="#a7f3d0" font-size="13" font-weight="700">train.py</text>
  <text x="400" y="114" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">AGENT EDITS THIS · ~630 LINES</text>

  <!-- Content -->
  <text x="311" y="140" fill="#e2e8f0" font-size="12" font-weight="600">Contains:</text>
  <text x="311" y="158" fill="#94a3b8" font-size="11">⚙  GPT model + rotary embeddings</text>
  <text x="311" y="175" fill="#94a3b8" font-size="11">⚙  Muon + AdamW dual optimizer</text>
  <text x="311" y="192" fill="#94a3b8" font-size="11">⚙  5-min TIME_BUDGET loop</text>
  <text x="311" y="209" fill="#94a3b8" font-size="11">⚙  val_bpb evaluation</text>

  <!-- Divider -->
  <line x1="311" y1="222" x2="489" y2="222" stroke="#065f46" stroke-width="1"/>

  <text x="311" y="240" fill="#e2e8f0" font-size="12" font-weight="600">Per-run time:</text>
  <text x="311" y="258" fill="#34d399" font-size="13" font-weight="700">Exactly 5 minutes</text>

  <text x="311" y="282" fill="#e2e8f0" font-size="12" font-weight="600">Agent access:</text>
  <rect x="311" y="292" width="118" height="22" rx="5" fill="#14532d"/>
  <text x="370" y="307" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700">FULL READ/WRITE</text>

  <!-- ═══════════════ program.md card ═══════════════ -->
  <rect x="552" y="76" width="218" height="256" rx="12" fill="url(#progGrad)" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow2)"/>
  <!-- Badge -->
  <rect x="552" y="76" width="218" height="36" rx="12" fill="#581c87"/>
  <rect x="552" y="100" width="218" height="12" fill="#581c87"/>
  <text x="661" y="100" text-anchor="middle" fill="#e9d5ff" font-size="13" font-weight="700">program.md</text>
  <text x="661" y="114" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">HUMAN WRITES · MARKDOWN</text>

  <!-- Content -->
  <text x="572" y="140" fill="#e2e8f0" font-size="12" font-weight="600">Contains:</text>
  <text x="572" y="158" fill="#94a3b8" font-size="11">📋  Optimization objective</text>
  <text x="572" y="175" fill="#94a3b8" font-size="11">📋  Constraints &amp; boundaries</text>
  <text x="572" y="192" fill="#94a3b8" font-size="11">📋  Keep/revert decision rules</text>
  <text x="572" y="209" fill="#94a3b8" font-size="11">📋  "NEVER STOP" loop directive</text>

  <!-- Divider -->
  <line x1="572" y1="222" x2="750" y2="222" stroke="#581c87" stroke-width="1"/>

  <text x="572" y="240" fill="#e2e8f0" font-size="12" font-weight="600">Edit frequency:</text>
  <text x="572" y="258" fill="#c084fc" font-size="13" font-weight="700">After reviewing results</text>

  <text x="572" y="282" fill="#e2e8f0" font-size="12" font-weight="600">Agent access:</text>
  <rect x="572" y="292" width="80" height="22" rx="5" fill="#3b0764"/>
  <text x="612" y="307" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="700">READ ONLY</text>

  <!-- ═══════════════ Flow arrows ═══════════════ -->
  <!-- prepare.py → train.py -->
  <line x1="248" y1="205" x2="288" y2="205" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="268" y="198" text-anchor="middle" fill="#60a5fa" font-size="9.5" font-weight="600">data</text>
  <text x="268" y="210" text-anchor="middle" fill="#60a5fa" font-size="9.5" font-weight="600">shards</text>

  <!-- program.md → train.py (reverse, agent reads program → edits train) -->
  <line x1="553" y1="185" x2="512" y2="185" stroke="#a855f7" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="533" y="178" text-anchor="middle" fill="#c084fc" font-size="9.5" font-weight="600">guides</text>
  <text x="533" y="191" text-anchor="middle" fill="#c084fc" font-size="9.5" font-weight="600">agent</text>

  <!-- ═══════════════ Results row ═══════════════ -->
  <!-- Connector from train.py down -->
  <line x1="400" y1="332" x2="400" y2="358" stroke="#10b981" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Results cards -->
  <rect x="100" y="360" width="176" height="46" rx="8" fill="#0f2a1e" stroke="#10b981" stroke-width="1"/>
  <text x="188" y="379" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Output Metric</text>
  <text x="188" y="397" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">val_bpb (lower = better)</text>

  <rect x="312" y="360" width="176" height="46" rx="8" fill="#0f2a1e" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="379" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Experiment Log</text>
  <text x="400" y="397" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">results.tsv</text>

  <rect x="524" y="360" width="176" height="46" rx="8" fill="#0f2a1e" stroke="#10b981" stroke-width="1"/>
  <text x="612" y="379" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Version Control</text>
  <text x="612" y="397" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">git commit / revert</text>

  <!-- Horizontal connector between result boxes -->
  <line x1="276" y1="383" x2="312" y2="383" stroke="#1e3a2e" stroke-width="1.5"/>
  <line x1="488" y1="383" x2="524" y2="383" stroke="#1e3a2e" stroke-width="1.5"/>
</svg>
