<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold">The Four Paradigm Shifts of AI Agents</text>

  <!-- Timeline line -->
  <line x1="80" y1="200" x2="820" y2="200" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Year markers -->
  <circle cx="150" cy="200" r="12" fill="#e94560"/>
  <circle cx="350" cy="200" r="12" fill="#f39c12"/>
  <circle cx="550" cy="200" r="12" fill="#27ae60"/>
  <circle cx="750" cy="200" r="12" fill="#3498db"/>

  <!-- Year labels -->
  <text x="150" y="240" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="14">Mar 2023</text>
  <text x="350" y="240" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="14">Mar 2024</text>
  <text x="550" y="240" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="14">Nov 2024</text>
  <text x="750" y="240" text-anchor="middle" fill="#888" font-family="system-ui, sans-serif" font-size="14">Oct 2025</text>

  <!-- Shift 1 -->
  <rect x="80" y="80" width="140" height="80" rx="8" fill="#e94560" fill-opacity="0.2" stroke="#e94560" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" fill="#e94560" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">SHIFT 1</text>
  <text x="150" y="125" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">The Loop</text>
  <text x="150" y="145" text-anchor="middle" fill="#aaa" font-family="system-ui, sans-serif" font-size="11">AutoGPT</text>

  <!-- Shift 2 -->
  <rect x="280" y="80" width="140" height="80" rx="8" fill="#f39c12" fill-opacity="0.2" stroke="#f39c12" stroke-width="2"/>
  <text x="350" y="105" text-anchor="middle" fill="#f39c12" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">SHIFT 2</text>
  <text x="350" y="125" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Pro Tools</text>
  <text x="350" y="145" text-anchor="middle" fill="#aaa" font-family="system-ui, sans-serif" font-size="11">Devin + Cursor</text>

  <!-- Shift 3 -->
  <rect x="480" y="80" width="140" height="80" rx="8" fill="#27ae60" fill-opacity="0.2" stroke="#27ae60" stroke-width="2"/>
  <text x="550" y="105" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">SHIFT 3</text>
  <text x="550" y="125" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Protocol Layer</text>
  <text x="550" y="145" text-anchor="middle" fill="#aaa" font-family="system-ui, sans-serif" font-size="11">MCP Standard</text>

  <!-- Shift 4 -->
  <rect x="680" y="80" width="140" height="80" rx="8" fill="#3498db" fill-opacity="0.2" stroke="#3498db" stroke-width="2"/>
  <text x="750" y="105" text-anchor="middle" fill="#3498db" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">SHIFT 4</text>
  <text x="750" y="125" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Extensible AI</text>
  <text x="750" y="145" text-anchor="middle" fill="#aaa" font-family="system-ui, sans-serif" font-size="11">Skills + Hooks</text>

  <!-- Bottom descriptions -->
  <text x="150" y="280" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">"Can AI iterate?"</text>
  <text x="350" y="280" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">"Can AI engineer?"</text>
  <text x="550" y="280" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">"Universal adapters"</text>
  <text x="750" y="280" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="10">"Programmable agents"</text>

  <!-- Key stats -->
  <text x="150" y="320" text-anchor="middle" fill="#e94560" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">100K GitHub stars</text>
  <text x="350" y="320" text-anchor="middle" fill="#f39c12" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">13.86% SWE-Bench</text>
  <text x="550" y="320" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">8M+ downloads</text>
  <text x="750" y="320" text-anchor="middle" fill="#3498db" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">$1B ARR (6 mo)</text>

  <!-- Arrow indicators -->
  <path d="M150 170 L150 188" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M350 170 L350 188" stroke="#f39c12" stroke-width="2"/>
  <path d="M550 170 L550 188" stroke="#27ae60" stroke-width="2"/>
  <path d="M750 170 L750 188" stroke="#3498db" stroke-width="2"/>
</svg>