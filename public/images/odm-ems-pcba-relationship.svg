<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="odmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pcbaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">How ODM, EMS &amp; PCBA Relate</text>
  <text x="400" y="70" text-anchor="middle" fill="#94a3b8" font-size="13">Business Models vs Manufacturing Process</text>

  <!-- EMS large container -->
  <rect x="60" y="95" width="680" height="380" rx="16" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="400" y="125" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="600">EMS SCOPE (Full Lifecycle Services)</text>

  <!-- ODM Box -->
  <rect x="90" y="145" width="280" height="310" rx="12" fill="url(#odmGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="230" y="178" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">ODM</text>
  <text x="230" y="198" text-anchor="middle" fill="#c4b5fd" font-size="11">Original Design Manufacturer</text>
  <line x1="130" y1="212" x2="330" y2="212" stroke="#8b5cf6" stroke-width="1"/>
  <text x="230" y="235" text-anchor="middle" fill="#e2d9f3" font-size="12">Design + Engineering</text>
  <text x="230" y="258" text-anchor="middle" fill="#e2d9f3" font-size="12">Product Development</text>
  <text x="230" y="281" text-anchor="middle" fill="#e2d9f3" font-size="12">Prototyping</text>
  <text x="230" y="304" text-anchor="middle" fill="#e2d9f3" font-size="12">Manufacturing</text>
  <text x="230" y="327" text-anchor="middle" fill="#e2d9f3" font-size="12">IP Owned by Manufacturer</text>
  <rect x="130" y="350" width="200" height="30" rx="6" fill="#4c1d95"/>
  <text x="230" y="370" text-anchor="middle" fill="#ddd6fe" font-size="11" font-weight="600">Client rebrands &amp; sells</text>

  <!-- Arrows -->
  <line x1="380" y1="300" x2="420" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <!-- EMS Box -->
  <rect x="430" y="145" width="280" height="310" rx="12" fill="url(#emsGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="570" y="178" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">EMS</text>
  <text x="570" y="198" text-anchor="middle" fill="#93c5fd" font-size="11">Electronics Manufacturing Services</text>
  <line x1="470" y1="212" x2="670" y2="212" stroke="#3b82f6" stroke-width="1"/>
  <text x="570" y="235" text-anchor="middle" fill="#dbeafe" font-size="12">Component Sourcing</text>
  <text x="570" y="258" text-anchor="middle" fill="#dbeafe" font-size="12">PCB Fabrication</text>
  <text x="570" y="281" text-anchor="middle" fill="#dbeafe" font-size="12">Testing &amp; QC</text>
  <text x="570" y="304" text-anchor="middle" fill="#dbeafe" font-size="12">Box-Build Assembly</text>
  <text x="570" y="327" text-anchor="middle" fill="#dbeafe" font-size="12">IP Owned by Client</text>

  <!-- PCBA inside EMS -->
  <rect x="465" y="348" width="210" height="90" rx="8" fill="url(#pcbaGrad)" filter="url(#shadow)"/>
  <text x="570" y="375" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">PCBA</text>
  <text x="570" y="393" text-anchor="middle" fill="#a7f3d0" font-size="10">Printed Circuit Board Assembly</text>
  <text x="570" y="413" text-anchor="middle" fill="#d1fae5" font-size="11">SMT + Through-Hole + Reflow</text>
  <text x="570" y="428" text-anchor="middle" fill="#d1fae5" font-size="11">A process WITHIN EMS</text>
</svg>